<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>互动问卷</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f0f4fa;
    min-height: 100vh;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .container {
    width: 100%;
    max-width: 500px;
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 8px 36px rgba(0,0,0,.08);
    padding: 26px 20px 34px;
    margin-bottom: 60px;
  }

  /* 欢迎页样式 */
  .welcome-card {
    text-align: center;
    padding: 40px 10px 20px;
    animation: fadeIn .4s ease;
  }
  .welcome-icon {
    font-size: 64px;
    margin-bottom: 20px;
  }
  .welcome-title {
    font-size: 24px;
    font-weight: 800;
    color: #1a2332;
    margin-bottom: 12px;
  }
  .welcome-sub {
    font-size: 14px;
    color: #8892a4;
    line-height: 1.6;
    margin-bottom: 36px;
  }
  .welcome-card .btn-primary {
    padding: 16px 0;
    font-size: 17px;
    border-radius: 16px;
  }

  /* 进度条 */
  .progress-bar {
    height: 6px;
    background: #e9edf4;
    border-radius: 3px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #5271ff, #7c62ff);
    border-radius: 3px;
    transition: width .45s cubic-bezier(.25,.46,.35,.94);
  }

  /* 题目卡片 */
  .question-card {
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .q-title {
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #1a2332;
  }
  .q-sub {
    font-size: 13px;
    color: #8892a4;
    margin-bottom: 20px;
  }

  /* ===== 表格式题目 ===== */
  .matrix-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 8px;
  }
  .matrix-table th,
  .matrix-table td {
    text-align: center;
    padding: 10px 6px;
    font-size: 13px;
    border-bottom: 1px solid #eef1f6;
  }
  .matrix-table th {
    font-weight: 600;
    color: #3d4a5c;
    background: #f7f9fd;
  }
  .matrix-table td:first-child {
    text-align: left;
    font-weight: 500;
    color: #1a2332;
    min-width: 80px;
  }
  .matrix-cell {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px solid #dce1ea;
    background: #fff;
    cursor: pointer;
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
    font-size: 14px;
    color: #3d4a5c;
  }
  .matrix-cell:active {
    transform: scale(.92);
  }
  .matrix-cell.selected {
    border-color: #5271ff;
    background: #5271ff;
    color: #fff;
    box-shadow: 0 3px 10px rgba(82,113,255,.25);
  }

  /* ===== 全新分段数轴样式 ===== */
  .axis-wrapper {
    margin: 28px 0 12px;
    padding: 0 4px;
  }

  .segment-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 2px;
  }

  .segment-label {
    font-size: 12px;
    color: #b0b8c4;
    text-align: center;
    flex: 1;
    padding: 6px 2px;
    border-radius: 8px;
    transition: all .3s cubic-bezier(.25,.46,.35,.94);
    cursor: default;
    line-height: 1.3;
    user-select: none;
  }

  .segment-label.active {
    color: #5271ff;
    font-size: 13px;
    font-weight: 600;
    background-color: rgba(82, 113, 255, 0.08);
    transform: translateY(-2px);
  }

  .axis-track {
    position: relative;
    height: 6px; /* 视觉轨道高度不变 */
    background: #e9edf4;
    border-radius: 3px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    /* ✅ 关键：上下各加20px padding，可点击区域扩大到46px高，不用改视觉 */
    padding: 20px 0;
    background-clip: content-box; /* 让背景只显示在content区域，不被padding撑开 */
  }

  .axis-track.dragging {
    background-color: #dce1ea;
    background-clip: content-box;
  }

  .axis-ticks {
    position: absolute;
    top: -6px;
    left: 0;
    width: 100%;
    height: 18px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }
  .axis-tick {
    width: 2px;
    height: 10px;
    background: #dce1ea;
    border-radius: 1px;
  }
  .axis-tick:first-child,
  .axis-tick:last-child {
    height: 16px;
    width: 3px;
  }

  .axis-thumb {
    position: absolute;
    top: 50%;
    width: 44px; /* ✅ 从36px放大到44px，最小触控尺寸 */
    height: 44px;
    background: #fff;
    border: 3px solid #5271ff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 4px 15px rgba(82,113,255,.3);
    pointer-events: none; /* ✅ 点击穿透到轨道，点滑块也能触发跳转 */
    transition: left .15s ease-out, transform .1s ease;
    z-index: 10;
    /* 桌面端hover效果，提示可交互 */
    .axis-track:hover & {
      transform: translate(-50%, -50%) scale(1.1);
    }
  }

  .axis-end-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 13px;
    font-weight: 600;
    color: #8892a4;
  }
  .axis-end-labels span.active {
    color: #5271ff;
  }

  .segment-label, .axis-end-labels {
    user-select: none;
    -webkit-user-select: none;
  }

  .input-wrapper {
    margin: 18px 0 8px;
  }
  .free-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #eef1f6;
    border-radius: 14px;
    font-size: 16px;
    color: #1a2332;
    transition: all .15s;
    outline: none;
    -webkit-appearance: none;
  }
  .free-input:focus {
    border-color: #5271ff;
    box-shadow: 0 0 0 3px rgba(82,113,255,.1);
  }
  .free-input::placeholder {
    color: #b0b8c4;
  }
  .free-input.textarea {
    min-height: 120px;
    resize: vertical;
  }
  .word-count {
    text-align: right;
    font-size: 12px;
    color: #8892a4;
    margin-top: 6px;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }
  .btn {
    flex: 1;
    padding: 14px 0;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary {
    background: #5271ff;
    color: #fff;
  }
  .btn-secondary {
    background: #eef1f6;
    color: #3d4a5c;
  }

  #result-page {
    display: none;
  }
  #result-page h2 { margin-bottom: 12px; }
  #result-page pre {
    background: #f7f9fd;
    border-radius: 12px;
    padding: 16px;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
  }
  .restart-btn {
    margin-top: 18px;
    background: #eef1f6;
    color: #3d4a5c;
    border: none;
    border-radius: 14px;
    padding: 12px 0;
    font-size: 15px;
    font-weight: 600;
    width: 100%;
    cursor: pointer;
  }
</style>
</head>

      { label: '2', desc: '有导师谈心，不强制<br>(◡ ω ◡)' },
      { label: '3', desc: '有事找老师，温和提醒<br>(｡•ᴗ•｡)' },

      { label: '6', desc: '当众批评，训斥式管理<br>(｀⌒´メ)' },

    ]
  },
  {

    rightLabel: '这里简直是衡水中学(ᗜ ˰ ᗜ)',
    segments: [
      { label: '1', desc: '无校服，发型随便弄<br>(๑•̀ㅂ•́)و' },
      { label: '2', desc: '有校服但不强查，可混穿<br>(´▽`ʃ♡)' },
      { label: '3', desc: '需穿校服，发型不染烫<br>(｡•ᴗ•｡)' },
      { label: '4', desc: '全套校服+发型抽查<br>(╥﹏╥)' },
      { label: '5', desc: '鞋袜配饰全管，每日检查<br>(ノへ￣、)' },

// ============================================================
// 2. 状态管理
// ============================================================
const answers = [];
let currentIndex = -1;
let axisValues = {};
let isAnswered = {};

// DOM 引用
const questionArea = document.getElementById('questionArea');
const progressFill = document.getElementById('progressFill');
const resultPage = document.getElementById('result-page');
const resultJson = document.getElementById('resultJson');

// ============================================================
// 渲染欢迎页
// ============================================================
function renderWelcome() {
  updateProgress(-1);
  const html = `
    <div class="welcome-card">
      <div class="welcome-icon">🎓</div>
      <h1 class="welcome-title">${welcomePage.title}</h1>
      <p class="welcome-sub">${welcomePage.subtitle}</p>
      <div class="btn-row">
        <button class="btn btn-primary" id="startBtn">${welcomePage.btnText}</button>
      </div>
    </div>
  `;
  questionArea.innerHTML = html;

  document.getElementById('startBtn').addEventListener('click', () => {
    currentIndex = 0;
    renderQuestion(currentIndex);
  });
}

// ============================================================
// 3. 渲染函数
// ============================================================
function renderQuestion(index) {
  if (index < 0) {
    renderWelcome();
    return;
  }
  if (index >= questions.length) {
    showResult();
    return;
  }

  const q = questions[index];
  updateProgress(index);

  let html = `<div class="question-card">`;
  html += `<div class="q-title">${q.title}</div>`;
  if (q.subtitle) html += `<div class="q-sub">${q.subtitle}</div>`;

  if (q.type === 'matrix') {
    html += renderMatrix(q);
  } else if (q.type === 'axis') {
    html += renderAxis(q, index);
  } else if (q.type === 'input') {
    html += renderInput(q, index);
  }

  html += `<div class="btn-row">`;
  if (index > 0) {
    html += `<button class="btn btn-secondary" id="prevBtn">← 上一题</button>`;
  } else {
    html += `<div></div>`;
  }

  const hasAnswer = isAnswered[index];
  const disabled = q.required && !hasAnswer ? 'disabled' : '';
  const btnText = index === questions.length - 1 ? '提交' : '下一题 →';
  html += `<button class="btn btn-primary" id="nextBtn" ${disabled}>${btnText}</button>`;
  html += `</div>`;
  html += `</div>`;

  questionArea.innerHTML = html;

  if (q.type === 'matrix') {
    bindMatrixEvents(q, index);
    checkMatrixReady(q, index);
  } else if (q.type === 'axis') {
    bindAxisEvents(q, index);
  } else if (q.type === 'input') {
    bindInputEvents(q, index);
  }

  const prevBtn = document.getElementById('prevBtn');
  if (prevBtn) {
    prevBtn.addEventListener('click', () => {
      currentIndex--;
      renderQuestion(currentIndex);
    });
  }

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.addEventListener('click', () => {
    saveCurrentAnswer(q, index);
    if (index < questions.length - 1) {
      currentIndex++;
      renderQuestion(currentIndex);
    } else {
      showResult();
    }
  });
}

// ============================================================
// 4. 渲染矩阵
// ============================================================
function renderMatrix(q) {
  let html = `<table class="matrix-table"><thead><tr><th></th>`;
  q.cols.forEach(col => { html += `<th>${col}</th>`; });
  html += `</tr></thead><tbody>`;
  q.rows.forEach((row, ri) => {
    html += `<tr><td>${row}</td>`;
    q.cols.forEach((col, ci) => {
      const key = `${ri}-${ci}`;
      html += `<td><span class="matrix-cell" data-row="${ri}" data-col="${ci}" data-key="${key}"></span></td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  return html;
}

function bindMatrixEvents(q, index) {
  const prevAnswer = answers.find(a => a.questionIndex === index);
  const cells = document.querySelectorAll('.matrix-cell');

  cells.forEach(cell => {
    cell.addEventListener('click', function() {
      const row = parseInt(this.dataset.row);
      document.querySelectorAll(`.matrix-cell[data-row="${row}"]`).forEach(c => c.classList.remove('selected'));
      this.classList.add('selected');
      isAnswered[index] = true;
      document.getElementById('nextBtn').disabled = false;
      checkMatrixReady(q, index);
    });

    if (prevAnswer && prevAnswer.value) {
      const rowKey = cell.dataset.row;
      if (prevAnswer.value[q.rows[rowKey]] === q.cols[cell.dataset.col]) {
        cell.classList.add('selected');
      }
    }
  });
}

function checkMatrixReady(q, index) {
  const rows = q.rows.length;
  const selectedCount = document.querySelectorAll('.matrix-cell.selected').length;
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) {
    nextBtn.disabled = selectedCount < rows;
    isAnswered[index] = selectedCount >= rows;
  }
}

// ============================================================
// 5. 渲染文本框
// ============================================================
function renderInput(q, index) {
  const prevAnswer = answers.find(a => a.questionIndex === index);
  const savedValue = prevAnswer ? prevAnswer.value : '';

  let inputHtml = '';
  if (q.inputType === 'textarea') {
    inputHtml = `
      <textarea
        class="free-input textarea"
        id="input_${index}"
        placeholder="${q.placeholder || ''}"
        ${q.required ? 'required' : ''}
      >${savedValue}</textarea>
      <div class="word-count" id="wordCount_${index}">已输入 ${savedValue.length} 字</div>
    `;
  } else {
    inputHtml = `
      <input
        type="text"
        class="free-input"
        id="input_${index}"
        placeholder="${q.placeholder || ''}"
        value="${savedValue}"
        ${q.required ? 'required' : ''}
      >
    `;
  }

  return `<div class="input-wrapper">${inputHtml}</div>`;
}

function bindInputEvents(q, index) {
  const input = document.getElementById(`input_${index}`);
  const nextBtn = document.getElementById('nextBtn');
  const wordCount = document.getElementById(`wordCount_${index}`);

  const checkInput = () => {
    const val = input.value.trim();
    isAnswered[index] = val.length > 0;
    if (q.required) {
      nextBtn.disabled = val === '';
    } else {
      nextBtn.disabled = false;
    }
    if (q.inputType === 'textarea' && wordCount) {
      wordCount.textContent = `已输入 ${val.length} 字`;
    }
  };

  input.addEventListener('input', checkInput);

  if (q.required && !input.value.trim()) {
    nextBtn.disabled = true;
  } else {
    nextBtn.disabled = false;
    if (input.value.trim()) {
      isAnswered[index] = true;
    }
  }

  input.style.fontSize = '16px';
}

// ============================================================
// 6. 渲染分段数轴
// ============================================================
function renderAxis(q, index) {
  const segments = q.segments || [{label: '低'}, {label: '中'}, {label: '高'}];
  const segmentCount = segments.length;
  const savedIndex = axisValues[index] !== undefined ? axisValues[index] : Math.floor(segmentCount / 2);

  const ticksHtml = Array(segmentCount).fill(0).map((_, i) =>
    `<div class="axis-tick" style="left: ${(i / (segmentCount - 1)) * 100}%"></div>`
  ).join('');

  const labelsHtml = segments.map((seg, i) =>
    `<div class="segment-label" data-index="${i}">${seg.desc || seg.label}</div>`
  ).join('');

  return `
    <div class="axis-wrapper" id="axisWrapper_${index}">
      <div class="segment-labels" id="segmentLabels_${index}">
        ${labelsHtml}
      </div>
      <div class="axis-track" id="axisTrack_${index}">
        <div class="axis-ticks">
          ${ticksHtml}
        </div>
        <div class="axis-thumb" id="axisThumb_${index}" style="left: ${(savedIndex / (segmentCount - 1)) * 100}%"></div>
      </div>
      <div class="axis-end-labels">
        <span id="leftLabel_${index}">${q.leftLabel || ''}</span>
        <span id="rightLabel_${index}">${q.rightLabel || ''}</span>
      </div>
    </div>
  `;
}

function bindAxisEvents(q, index) {
  const track = document.getElementById(`axisTrack_${index}`);
  const thumb = document.getElementById(`axisThumb_${index}`);
  const segmentLabels = document.getElementById(`segmentLabels_${index}`);
  const leftLabel = document.getElementById(`leftLabel_${index}`);
  const rightLabel = document.getElementById(`rightLabel_${index}`);
  const nextBtn = document.getElementById('nextBtn');

  const segments = q.segments || [];
  const segmentCount = segments.length;
  let isDragging = false;
  let dragStartX = 0; // 记录拖动起始位置

  // 更新高亮状态（保持原逻辑）
  function updateHighlight(activeIndex) {
    segmentLabels.querySelectorAll('.segment-label').forEach((label, i) => {
      if (i === activeIndex) {
        label.classList.add('active');
      } else {
        label.classList.remove('active');
      }
    });
    leftLabel.classList.remove('active');
    rightLabel.classList.remove('active');
    if (activeIndex === 0) {
      leftLabel.classList.add('active');
    } else if (activeIndex === segmentCount - 1) {
      rightLabel.classList.add('active');
    }
  }

  // 计算最近吸附点（保持原逻辑）
  function snapToNearest(e) {
    const rect = track.getBoundingClientRect();
    let x;
    if (e.touches) {
      x = e.touches[0].clientX - rect.left;
    } else {
      x = e.clientX - rect.left;
    }
    // 限制在轨道范围内（包括padding扩展的热区）
    x = Math.max(0, Math.min(x, rect.width));
    const percent = x / rect.width;
    const segmentIndex = Math.round(percent * (segmentCount - 1));
    const snappedPercent = (segmentIndex / (segmentCount - 1)) * 100;

    thumb.style.left = snappedPercent + '%';
    updateHighlight(segmentIndex);
    setAxisValue(index, segmentIndex);
    if (nextBtn) nextBtn.disabled = false;
    isAnswered[index] = true;
  }

  // ✅ 拖动开始：禁止文本选中+记录起始位置
  const startDrag = (e) => {
    isDragging = true;
    dragStartX = e.touches ? e.touches[0].clientX : e.clientX;
    // 禁止全局文本选中，彻底解决拖动时选中文字的问题
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
    track.classList.add('dragging'); // 轨道高亮反馈
    snapToNearest(e);
  };

  // ✅ 拖动中：阻止页面滚动+更新位置
  const doDrag = (e) => {
    if (!isDragging) return;
    e.preventDefault(); // 防止拖动时页面跟着滚动
    snapToNearest(e);
  };

  // ✅ 拖动结束：恢复文本选中+清除状态
  const endDrag = () => {
    if (!isDragging) return;
    isDragging = false;
    // 恢复文本选中
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
    track.classList.remove('dragging');
  };

  // ✅ 绑定事件：点击+拖动全支持
  track.addEventListener('click', snapToNearest); // 点击任意位置直接跳转
  track.addEventListener('touchstart', startDrag, { passive: false });
  track.addEventListener('touchmove', doDrag, { passive: false });
  track.addEventListener('touchend', endDrag);
  track.addEventListener('mousedown', startDrag);
  document.addEventListener('mousemove', doDrag);
  document.addEventListener('mouseup', endDrag);

  // 初始化高亮和滑块位置
  const initIndex = axisValues[index] !== undefined ? axisValues[index] : Math.floor(segmentCount / 2);
  updateHighlight(initIndex);
  const snappedPercent = (initIndex / (segmentCount - 1)) * 100;
  thumb.style.left = snappedPercent + '%';
}

function setAxisValue(index, val) {
  axisValues[index] = parseInt(val, 10);
}

// ============================================================
// 7. 保存答案
// ============================================================
function saveCurrentAnswer(q, index) {
  if (q.type === 'matrix') {
    const selectedCells = document.querySelectorAll('.matrix-cell.selected');
    const matrixAns = {};
    selectedCells.forEach(cell => {
      const rowIdx = cell.dataset.row;
      const colIdx = cell.dataset.col;
      matrixAns[q.rows[rowIdx]] = q.cols[colIdx];
    });

    const existing = answers.find(a => a.questionIndex === index);
    if (existing) {
      existing.value = matrixAns;
    } else {
      answers.push({
        questionIndex: index,
        title: q.title,
        type: 'matrix',
        value: matrixAns
      });
    }
  } else if (q.type === 'axis') {
    const segmentIndex = axisValues[index] !== undefined ? axisValues[index] : 0;
    const segmentData = q.segments ? q.segments[segmentIndex] : null;
    const val = segmentData ? segmentData.label : `段${segmentIndex + 1}`;

    const existing = answers.find(a => a.questionIndex === index);
    if (existing) {
      existing.value = val;
      existing.segmentIndex = segmentIndex;
    } else {
      answers.push({
        questionIndex: index,
        title: q.title,
        type: 'axis',
        value: val,
        segmentIndex: segmentIndex
      });
    }
  } else if (q.type === 'input') {
    const input = document.getElementById(`input_${index}`);
    const val = input.value.trim();
    const existing = answers.find(a => a.questionIndex === index);
    if (existing) {
      existing.value = val;
    } else {
      answers.push({
        questionIndex: index,
        title: q.title,
        type: 'input',
        required: q.required,
        value: val
      });
    }
  }
}

// ============================================================
// 8. 进度 & 结果
// ============================================================
function updateProgress(index) {
  const total = questions.length;
  const pct = index < 0 ? 0 : (index / total) * 100;
  progressFill.style.width = pct + '%';
}

function showResult() {
  questionArea.style.display = 'none';
  resultPage.style.display = 'block';
  progressFill.style.width = '100%';

  const output = {
    timestamp: new Date().toISOString(),
    answers: answers.map(a => ({
      title: a.title,
      type: a.type,
      value: a.value
    }))
  };
  resultJson.textContent = JSON.stringify(output, null, 2);
  console.log('问卷数据：', output);
}

// ============================================================
// 9. 启动
// ============================================================
renderWelcome();
</script>
